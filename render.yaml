databases:
  - name: employeesystem-db
    databaseName: employeesystem
    user: employeesystem
    plan: free

services:
  - type: web
    name: employeesystem
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ApplyMigrations
        value: "true"
      - key: DatabaseProvider
        value: Postgres
      - key: SeedDefaultUsers
        value: "true"
      - key: SeedSampleData
        value: "true"
      - key: Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command
        value: Warning
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.1-8b-instruct:free
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: employeesystem-db
          property: connectionString
